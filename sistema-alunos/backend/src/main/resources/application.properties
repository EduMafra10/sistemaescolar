# Roda na porta 8080
server.port=8080

# Banco H2 em memoria (zera quando reinicia)
spring.datasource.url=jdbc:h2:mem:alunos
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Console do H2 pra ver o banco no navegador: http://localhost:8080/h2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
